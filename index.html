<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor</title>

    <!--
    =====================================================================
    COMPONENTE 1: PLYR CSS
    La hoja de estilos oficial de Plyr. Dibuja todos los controles
    (play, barra de progreso, volumen, fullscreen, settings, etc.)
    En la página original se carga desde:
    /wp-content/plugins/tutor/assets/lib/plyr/plyr.css
    =====================================================================
    -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

    <!--
    =====================================================================
    COMPONENTE 2: ESTILOS DEL REPRODUCTOR
    Extraídos del CSS inline de Tutor LMS y del CSS de tutor-front.min.css
    que controlan el wrapper del video, el aspecto del player y el
    aspect ratio 16:9.
    =====================================================================
    -->
    <style>
        /* ---- Variables de color del tema (extraídas de tutor-frontend-inline-css) ---- */
        :root {
            --tutor-color-primary: #e63946;
            --tutor-color-primary-rgb: 230, 57, 70;
            --tutor-color-primary-hover: #ff4d5a;
            --tutor-color-primary-hover-rgb: 255, 77, 90;
            --tutor-body-color: #111111;
            --tutor-body-color-rgb: 17, 17, 17;
            --tutor-border-color: #333333;
            --tutor-border-color-rgb: 51, 51, 51;
            --tutor-color-gray: #222222;
            --tutor-color-gray-rgb: 34, 34, 34;
        }

        /* ---- Colores personalizados de Plyr (sobreescribe los defaults) ---- */
        :root {
            --plyr-color-main: var(--tutor-color-primary);
            --plyr-video-control-color: #fff;
            --plyr-video-control-color-hover: #fff;
            --plyr-video-control-background-hover: rgba(var(--tutor-color-primary-rgb), 0.3);
            --plyr-range-fill-background: var(--tutor-color-primary);
            --plyr-badge-background: var(--tutor-color-primary);
            --plyr-badge-text-color: #fff;
            --plyr-tooltip-background: rgba(0,0,0,0.85);
            --plyr-tooltip-color: #fff;
        }

        /* ---- Wrapper del video player ---- */
        .tutor-video-player-wrapper {
            position: relative;
            background: #000;
            overflow: hidden;
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        .tutor-video-player {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Loading spinner (de tutor.min.css) */
        .tutor-video-player .loading-spinner {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: var(--tutor-color-primary);
            border-radius: 50%;
            animation: tutor-spin 0.8s linear infinite;
            z-index: 10;
        }

        @keyframes tutor-spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* ---- Plyr video embed - aspect ratio 16:9, auto-adapt to container ---- */
        .plyr__video-embed {
            aspect-ratio: 16 / 9;
            overflow: hidden;
            position: relative;
            max-width: 100%;
            max-height: 100%;
            width: 100%;
        }

        .plyr {
            max-width: 100%;
            max-height: 100%;
            width: 100%;
            height: 100%;
        }

        /* ---- Video directo (MP4/WebM) ---- */
        video.tutorPlayer {
            width: 100%;
            max-height: 100%;
        }

        .plyr__video-embed iframe {
            border: 0;
            left: 0;
            position: absolute;
            /* Agrandar iframe para ocultar UI de YouTube (suscribirse, título, logo) */
            top: -60px;
            height: calc(100% + 120px);
            width: 100%;
            pointer-events: auto;
        }

        /* ---- Plyr wrapper que Plyr genera dinámicamente ---- */
        /* El .plyr__video-wrapper es creado por Plyr al inicializar.
           Necesita position:relative para que la marca de agua
           se posicione correctamente dentro. */
        .plyr__video-wrapper {
            position: relative;
        }

        /* ---- Overlay negro para ocultar branding de YouTube/Vimeo al cargar ---- */
        #video-loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease;
            cursor: pointer;
        }
        #video-loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #video-loading-overlay .overlay-play-btn {
            width: 70px;
            height: 70px;
            background: var(--tutor-color-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        #video-loading-overlay:hover .overlay-play-btn {
            transform: scale(1.1);
        }
        #video-loading-overlay .overlay-play-btn::after {
            content: '';
            display: block;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 12px 0 12px 22px;
            border-color: transparent transparent transparent #fff;
            margin-left: 4px;
        }

        /* ---- Ocultar elementos de branding de YouTube dentro del embed ---- */
        .plyr__video-embed .plyr__poster {
            z-index: 2;
        }

        /* ---- Marca de agua dinámica (extraída del script inline original) ---- */
        #watermark-dinamica {
            position: absolute;
            color: rgba(255, 255, 255, 0.4);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
            font-size: 16px;
            font-weight: bold;
            z-index: 999999;
            pointer-events: none;
            transition: transform 5s ease-in-out;
        }

        /* ---- Panel de URL ---- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body { background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; }

        .url-panel {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 20px;
            background: #111111;
            border-bottom: 2px solid var(--tutor-color-primary);
        }

        .url-panel label {
            color: var(--tutor-color-primary);
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
        }

        .url-panel input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #333;
            border-radius: 6px;
            background: #1a1a1a;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .url-panel input:focus {
            border-color: var(--tutor-color-primary);
        }

        .url-panel input::placeholder {
            color: #666;
        }

        .url-panel button {
            padding: 10px 20px;
            background: var(--tutor-color-primary);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .url-panel button:hover {
            background: var(--tutor-color-primary-hover);
        }

        .url-status {
            color: #999;
            font-size: 12px;
            padding: 6px 20px;
            background: #111111;
            min-height: 28px;
        }

        .url-status.error { color: #ff6b6b; }
        .url-status.success { color: #ffffff; }

        /* ---- RESPONSIVE: Tablets (max 768px) ---- */
        @media (max-width: 768px) {
            .url-panel {
                flex-wrap: wrap;
                padding: 10px 12px;
                gap: 8px;
            }
            .url-panel label {
                width: 100%;
                font-size: 13px;
            }
            .url-panel input {
                width: 100%;
                flex: 1 1 100%;
                font-size: 13px;
                padding: 9px 10px;
            }
            .url-panel button {
                flex: 1;
                font-size: 13px;
                padding: 9px 12px;
            }
            .url-status {
                font-size: 11px;
                padding: 5px 12px;
            }
            #watermark-dinamica {
                font-size: 13px !important;
            }
        }

        /* ---- RESPONSIVE: Móviles (max 480px) ---- */
        @media (max-width: 480px) {
            .url-panel {
                padding: 8px 8px;
                gap: 6px;
            }
            .url-panel label {
                font-size: 12px;
            }
            .url-panel input {
                font-size: 12px;
                padding: 8px;
            }
            .url-panel button {
                font-size: 12px;
                padding: 8px 10px;
            }
            .url-status {
                font-size: 10px;
                padding: 4px 8px;
                min-height: 22px;
            }
            #watermark-dinamica {
                font-size: 11px !important;
            }
            .plyr__video-embed iframe {
                top: -30px;
                height: calc(100% + 60px);
            }
        }

        /* ---- RESPONSIVE: Pantallas muy pequeñas (max 360px) ---- */
        @media (max-width: 360px) {
            .url-panel button {
                font-size: 11px;
                padding: 7px 6px;
            }
            .url-panel input {
                font-size: 11px;
            }
        }

        /* ---- Fullscreen desde contenedor externo (iframe embebido) ---- */
        :fullscreen body,
        :-webkit-full-screen body {
            height: 100vh;
            width: 100vw;
        }
    </style>
</head>
<body>

    <!-- ============== PANEL DE URL ============== -->
    <div class="url-panel">
        <label for="youtube-url">URL Video:</label>
        <input type="text" id="youtube-url" placeholder="Pega URL de YouTube, Vimeo o enlace directo MP4/WebM" autocomplete="off" spellcheck="false">
        <button id="btn-cargar" onclick="cargarVideo()">Cargar Video</button>
        <button id="btn-copiar" onclick="copiarEnlace()" style="background:#fff;color:#111;">Copiar Enlace</button>
    </div>
    <div class="url-status" id="url-status">Pega una URL (YouTube, Vimeo o MP4) y presiona "Cargar Video" o simplemente Ctrl+V</div>
    <div class="url-status" id="link-generado" style="display:none; cursor:pointer;" onclick="copiarTextoLink()"></div>

    <!--
    =====================================================================
    COMPONENTE 3: HTML DEL REPRODUCTOR
    Estructura exacta extraída de la página original (líneas 1861-1873).
    
    - input#tutor_video_tracking_information: datos de tracking del video
      (progreso, duración, modo estricto, etc.). Tutor LMS lee esto para
      controlar el avance de la lección.
    
    - div.plyr__video-embed.tutorPlayer: el contenedor que Plyr detecta
      y transforma en reproductor. La clase "tutorPlayer" es la que
      tutor-front.js busca para inicializar Plyr.
    
    - iframe de YouTube: la fuente del video con parámetros para ocultar
      controles nativos de YouTube:
        iv_load_policy=3  → sin anotaciones
        modestbranding=1  → mínimo logo YouTube
        playsinline=1     → no fullscreen auto en móvil
        showinfo=0        → sin título del video
        rel=0             → sin videos relacionados al final
        enablejsapi=1     → permite control via JavaScript (YouTube IFrame API)
    =====================================================================
    -->

    <!-- Datos de tracking del video -->
    <input type="hidden" id="tutor_video_tracking_information" value='{
        "post_id": 7237,
        "best_watch_time": "0",
        "autoload_next_course_content": true,
        "strict_mode": true,
        "control_video_lesson_completion": false,
        "required_percentage": 80,
        "video_duration": "1192.301",
        "lesson_completed": false,
        "is_enrolled": true
    }'>

    <!-- Wrapper principal del reproductor -->
    <div class="tutor-video-player-wrapper">
        <div class="tutor-video-player">
            <!-- Spinner de carga -->
            <div class="loading-spinner" aria-hidden="true"></div>
            <!-- Contenedor del reproductor (vacío hasta que se cargue un video) -->
        </div>
    </div>


    <!--
    =====================================================================
    COMPONENTE 4: PLYR JS (librería)
    El motor del reproductor. plyr.polyfilled.min.js incluye los
    polyfills necesarios para navegadores viejos.
    En la página original se carga desde:
    /wp-content/plugins/tutor/assets/lib/plyr/plyr.polyfilled.min.js
    =====================================================================
    -->
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>


    <!--
    =====================================================================
    COMPONENTE 5: INICIALIZACIÓN DEL REPRODUCTOR
    Extraído y simplificado del código de tutor-front.js (archivo de
    ~3000 líneas). Aquí está la parte que hace funcionar al reproductor:
    
    1. Busca todos los elementos con clase .tutorPlayer
    2. Crea una instancia de Plyr en cada uno
    3. Configura los controles, velocidad, YouTube params
    4. Plyr automáticamente:
       - Oculta los controles nativos de YouTube
       - Inyecta sus propios controles HTML
       - Se comunica con YouTube via enablejsapi (YouTube IFrame API)
    =====================================================================
    -->
    <script>
    // ---- Variables globales del reproductor ----
    var plyrConfig = {
        controls: [
            'play-large', 'play', 'progress', 'current-time',
            'duration', 'mute', 'volume', 'settings', 'fullscreen'
        ],
        settings: ['speed'],
        speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 1.75, 2] },
        keyboard: { focused: true, global: false },
        tooltips: { controls: true, seek: true },
        clickToPlay: true,
        hideControls: true,
        resetOnEnd: false,
        invertTime: true,
        disableContextMenu: true,
        youtube: {
            noCookie: false, rel: 0, showinfo: 0,
            iv_load_policy: 3, modestbranding: 1,
            playsinline: 1, enablejsapi: 1, controls: 0,
            origin: window.location.origin
        }
    };

    window.tutorPlayer = null;

    // ---- Detectar tipo de URL ----
    function detectarTipoURL(url) {
        url = url.trim();
        // YouTube
        var ytPatterns = [
            /(?:youtube\.com\/watch\?.*v=)([a-zA-Z0-9_-]{11})/,
            /(?:youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
            /(?:youtube\.com\/v\/)([a-zA-Z0-9_-]{11})/,
            /(?:youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,
            /(?:youtu\.be\/)([a-zA-Z0-9_-]{11})/
        ];
        for (var i = 0; i < ytPatterns.length; i++) {
            var match = url.match(ytPatterns[i]);
            if (match) return { type: 'youtube', id: match[1] };
        }
        // YouTube ID directo (11 chars)
        if (/^[a-zA-Z0-9_-]{11}$/.test(url)) return { type: 'youtube', id: url };

        // Vimeo
        var vimeoMatch = url.match(/(?:vimeo\.com\/)(?:video\/)?(?:channels\/[^/]+\/)?([0-9]+)/);
        if (vimeoMatch) return { type: 'vimeo', id: vimeoMatch[1] };

        // MP4 / WebM directo
        if (/\.(mp4|webm|ogg|m4v)(\?.*)?$/i.test(url) || /^https?:\/\/.+\.(mp4|webm|ogg|m4v)/i.test(url)) {
            return { type: 'video', url: url };
        }
        // HLS
        if (/\.m3u8(\?.*)?$/i.test(url)) {
            return { type: 'hls', url: url };
        }

        return null;
    }

    // ---- Extraer ID de YouTube (compatibilidad) ----
    function extraerYouTubeId(url) {
        var result = detectarTipoURL(url);
        if (result && result.type === 'youtube') return result.id;
        return null;
    }

    // ---- Mostrar estado en el panel ----
    function setStatus(msg, type) {
        var el = document.getElementById('url-status');
        el.textContent = msg;
        el.className = 'url-status' + (type ? ' ' + type : '');
    }

    // ---- Cargar video nuevo ----
    function cargarVideo() {
        var input = document.getElementById('youtube-url');
        var url = input.value.trim();
        var source = detectarTipoURL(url);

        if (!source) {
            setStatus('URL no válida. Usa YouTube, Vimeo o un enlace directo MP4/WebM', 'error');
            return;
        }

        setStatus('Cargando video...', '');

        // Destruir instancia anterior de Plyr
        if (window.tutorPlayer) {
            window.tutorPlayer.destroy();
            window.tutorPlayer = null;
        }

        // Eliminar marca de agua anterior
        var oldWatermark = document.getElementById('watermark-dinamica');
        if (oldWatermark) oldWatermark.remove();

        // Eliminar overlay anterior
        var oldOverlay = document.getElementById('video-loading-overlay');
        if (oldOverlay) oldOverlay.remove();

        // Limpiar contenedor del reproductor
        var playerContainer = document.querySelector('.tutor-video-player');
        var oldEmbed = playerContainer.querySelector('.plyr__video-embed, .tutorPlayer, video');
        if (oldEmbed) oldEmbed.remove();

        var newElement;

        if (source.type === 'youtube') {
            // YouTube embed
            newElement = document.createElement('div');
            newElement.className = 'plyr__video-embed tutorPlayer';
            var iframe = document.createElement('iframe');
            iframe.src = 'https://www.youtube-nocookie.com/embed/' + source.id + '?origin=' + encodeURIComponent(window.location.origin) + '&iv_load_policy=3&modestbranding=1&playsinline=1&showinfo=0&rel=0&enablejsapi=1';
            iframe.setAttribute('allowfullscreen', '');
            iframe.setAttribute('allowtransparency', '');
            iframe.setAttribute('allow', 'autoplay');
            newElement.appendChild(iframe);
            playerContainer.appendChild(newElement);
            mostrarOverlay(playerContainer);
            initPlyr(newElement);
            setStatus('YouTube cargado: ' + source.id, 'success');

        } else if (source.type === 'vimeo') {
            // Vimeo embed
            newElement = document.createElement('div');
            newElement.className = 'plyr__video-embed tutorPlayer';
            var iframe = document.createElement('iframe');
            iframe.src = 'https://player.vimeo.com/video/' + source.id + '?loop=false&byline=false&portrait=false&title=false&speed=true&transparent=0';
            iframe.setAttribute('allowfullscreen', '');
            iframe.setAttribute('allowtransparency', '');
            iframe.setAttribute('allow', 'autoplay');
            newElement.appendChild(iframe);
            playerContainer.appendChild(newElement);
            mostrarOverlay(playerContainer);
            initPlyr(newElement);
            setStatus('Vimeo cargado: ' + source.id, 'success');

        } else if (source.type === 'video') {
            // MP4/WebM directo
            newElement = document.createElement('video');
            newElement.className = 'tutorPlayer';
            newElement.setAttribute('playsinline', '');
            newElement.setAttribute('controls', '');
            newElement.setAttribute('crossorigin', '');
            var sourceEl = document.createElement('source');
            sourceEl.src = source.url;
            if (/\.webm/i.test(source.url)) sourceEl.type = 'video/webm';
            else if (/\.ogg/i.test(source.url)) sourceEl.type = 'video/ogg';
            else sourceEl.type = 'video/mp4';
            newElement.appendChild(sourceEl);
            playerContainer.appendChild(newElement);
            initPlyr(newElement);
            setStatus('Video directo cargado', 'success');

        } else if (source.type === 'hls') {
            // HLS stream
            newElement = document.createElement('video');
            newElement.className = 'tutorPlayer';
            newElement.setAttribute('playsinline', '');
            newElement.setAttribute('controls', '');
            if (Hls && Hls.isSupported()) {
                var hls = new Hls();
                hls.loadSource(source.url);
                hls.attachMedia(newElement);
            } else if (newElement.canPlayType('application/vnd.apple.mpegurl')) {
                newElement.src = source.url;
            }
            playerContainer.appendChild(newElement);
            initPlyr(newElement);
            setStatus('Stream HLS cargado', 'success');
        }

        // Re-inicializar marca de agua
        setTimeout(initWatermark, 1500);
    }

    // ---- Mostrar overlay negro mientras carga el video ----
    function mostrarOverlay(container) {
        var old = document.getElementById('video-loading-overlay');
        if (old) old.remove();
        var overlay = document.createElement('div');
        overlay.id = 'video-loading-overlay';
        overlay.innerHTML = '<div class="overlay-play-btn"></div>';
        overlay.addEventListener('click', function() {
            if (window.tutorPlayer) {
                window.tutorPlayer.play();
            }
        });
        container.appendChild(overlay);
    }

    function ocultarOverlay() {
        var overlay = document.getElementById('video-loading-overlay');
        if (overlay) {
            overlay.classList.add('hidden');
            setTimeout(function() { if (overlay.parentNode) overlay.remove(); }, 500);
        }
    }

    // ---- Inicializar Plyr en un elemento ----
    function initPlyr(element) {
        var playerInstance = new Plyr(element, plyrConfig);

        playerInstance.on('ready', function() {
            var spinner = element.closest('.tutor-video-player');
            if (spinner) {
                var loadingEl = spinner.querySelector('.loading-spinner');
                if (loadingEl) loadingEl.style.display = 'none';
            }
        });

        // Ocultar overlay cuando el video realmente empieza a reproducirse
        playerInstance.on('playing', function() {
            ocultarOverlay();
        });

        playerInstance.on('timeupdate', function() {
            var trackingInput = document.getElementById('tutor_video_tracking_information');
            if (trackingInput) {
                try {
                    var trackData = JSON.parse(trackingInput.value);
                    if (playerInstance.currentTime > parseFloat(trackData.best_watch_time)) {
                        trackData.best_watch_time = String(playerInstance.currentTime);
                        trackingInput.value = JSON.stringify(trackData);
                    }
                } catch(e) {}
            }
        });

        playerInstance.on('ended', function() {
            var trackingInput = document.getElementById('tutor_video_tracking_information');
            if (trackingInput) {
                try {
                    var trackData = JSON.parse(trackingInput.value);
                    if (trackData.autoload_next_course_content) {
                        // navigateToNextLesson();
                    }
                } catch(e) {}
            }
        });

        window.tutorPlayer = playerInstance;
    }

    // ---- Auto-detectar URL al pegar (Ctrl+V) ----
    document.getElementById('youtube-url').addEventListener('paste', function(e) {
        setTimeout(function() {
            var val = document.getElementById('youtube-url').value;
            if (detectarTipoURL(val)) {
                cargarVideo();
            }
        }, 100);
    });

    // ---- Cargar con Enter ----
    document.getElementById('youtube-url').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') cargarVideo();
    });

    // ---- Generar y copiar enlace personalizado ----
    function copiarEnlace() {
        var input = document.getElementById('youtube-url');
        var url = input.value.trim();
        if (!url) {
            setStatus('Primero carga un video para generar el enlace', 'error');
            return;
        }
        var source = detectarTipoURL(url);
        if (!source) {
            setStatus('Primero carga un video para generar el enlace', 'error');
            return;
        }
        // Codificar solo el ID/dato mínimo con prefijo de tipo
        var codigo;
        if (source.type === 'youtube') {
            codigo = btoa('yt.' + source.id);
        } else if (source.type === 'vimeo') {
            codigo = btoa('vm.' + source.id);
        } else {
            codigo = btoa('dr.' + (source.url || url));
        }
        var enlace = window.location.origin + window.location.pathname + '?v=' + codigo;
        navigator.clipboard.writeText(enlace).then(function() {
            var linkDiv = document.getElementById('link-generado');
            linkDiv.style.display = 'block';
            linkDiv.innerHTML = '<span style="color:#ffffff;">Enlace copiado al portapapeles:</span> <span style="color:#e63946;text-decoration:underline;">' + enlace + '</span>';
            linkDiv.className = 'url-status success';
        });
    }

    function copiarTextoLink() {
        var linkDiv = document.getElementById('link-generado');
        var spans = linkDiv.querySelectorAll('span');
        var enlace = spans.length > 1 ? spans[1].textContent.trim() : '';
        if (enlace) {
            navigator.clipboard.writeText(enlace).then(function() {
                var original = spans[0].textContent;
                spans[0].textContent = '¡Enlace copiado! ';
                setTimeout(function() { spans[0].textContent = original; }, 1500);
            });
        }
    }

    // ---- Auto-cargar video desde URL codificada ----
    (function() {
        var params = new URLSearchParams(window.location.search);
        var decodedUrl = null;

        // Intentar ?v= (Base64 encoded con prefijo de tipo)
        var vParam = params.get('v');
        if (vParam) {
            try {
                var decoded = atob(vParam);
                if (decoded.indexOf('yt.') === 0) {
                    decodedUrl = 'https://www.youtube.com/watch?v=' + decoded.substring(3);
                } else if (decoded.indexOf('vm.') === 0) {
                    decodedUrl = 'https://vimeo.com/' + decoded.substring(3);
                } else if (decoded.indexOf('dr.') === 0) {
                    decodedUrl = decoded.substring(3);
                } else {
                    // Compatibilidad con links viejos (URL completa en Base64)
                    decodedUrl = decoded;
                }
            } catch(e) { decodedUrl = null; }
        }
        // Fallback: ?vid= directo (compatibilidad YouTube)
        if (!decodedUrl) {
            var vidParam = params.get('vid');
            if (vidParam && /^[a-zA-Z0-9_-]{11}$/.test(vidParam)) {
                decodedUrl = 'https://www.youtube.com/watch?v=' + vidParam;
            }
        }

        if (decodedUrl && detectarTipoURL(decodedUrl)) {
            // Ocultar panel de URL (modo enlace compartido: solo reproductor)
            document.querySelector('.url-panel').style.display = 'none';
            document.getElementById('url-status').style.display = 'none';
            var linkGen = document.getElementById('link-generado');
            if (linkGen) linkGen.style.display = 'none';

            document.getElementById('youtube-url').value = decodedUrl;
            setTimeout(function() { cargarVideo(); }, 300);
        }
        // Sin parámetro → no cargar nada, esperar a que el usuario pegue una URL
    })();
    </script>


    <!--
    =====================================================================
    COMPONENTE 6: MARCA DE AGUA DINÁMICA (anti screen-recording)
    Código EXACTO extraído del script inline de la página original
    (líneas 2207-2290). No cambiado — es el mismo que usan ellos.
    
    Funcionamiento:
    1. Espera a que Plyr genere el .plyr__video-wrapper
    2. Crea un <div> con el email del usuario sobre el video
    3. Cada 30 segundos lo mueve a una posición aleatoria
    4. Usa CSS transition para que el movimiento sea suave
    5. pointer-events:none para que no interfiera con los controles
    =====================================================================
    -->
    <script>
        // Genera un ID único del dispositivo basado en sus características de hardware/software
        function getDeviceId() {
            var raw = [
                navigator.userAgent,
                navigator.language,
                screen.width + 'x' + screen.height,
                screen.colorDepth,
                new Date().getTimezoneOffset(),
                navigator.hardwareConcurrency || 'na',
                navigator.platform,
                (navigator.deviceMemory || 'na')
            ].join('|');
            // Hash simple FNV-1a de 32 bits → hex
            var hash = 0x811c9dc5;
            for (var i = 0; i < raw.length; i++) {
                hash ^= raw.charCodeAt(i);
                hash = Math.imul(hash, 0x01000193);
            }
            var hex = (hash >>> 0).toString(16).toUpperCase();
            while (hex.length < 8) hex = '0' + hex;
            return 'DVC-' + hex.substring(0,4) + '-' + hex.substring(4);
        }

        function initWatermark() {
            // Usar .plyr__video-embed como contenedor visible (tiene overflow:hidden)
            var visibleContainer = document.querySelector('.plyr__video-embed') || document.querySelector('.plyr');
            if (!visibleContainer) {
                setTimeout(initWatermark, 1000);
                return;
            }

            var watermark = document.getElementById('watermark-dinamica');
            if (!watermark) {
                watermark = document.createElement('div');
                watermark.id = 'watermark-dinamica';
                watermark.textContent = getDeviceId();
                visibleContainer.appendChild(watermark);
            }

            watermark.style.cssText = '\
                position: absolute;\
                color: rgba(255, 255, 255, 0.4);\
                text-shadow: 1px 1px 2px rgba(0,0,0,0.6);\
                font-size: 16px;\
                font-weight: bold;\
                z-index: 999999;\
                pointer-events: none;\
                transition: left 1.5s ease-in-out, top 1.5s ease-in-out;\
            ';

            function moveWatermark() {
                var w = visibleContainer.clientWidth;
                var h = visibleContainer.clientHeight;
                var wmW = watermark.offsetWidth || 120;
                var wmH = watermark.offsetHeight || 20;
                var pad = 15;
                var bottomPad = 50;

                var maxLeft = Math.max(pad, w - wmW - pad);
                var maxTop = Math.max(pad, h - wmH - bottomPad);

                watermark.style.left = (pad + Math.random() * (maxLeft - pad)) + 'px';
                watermark.style.top = (pad + Math.random() * (maxTop - pad)) + 'px';
            }

            setInterval(moveWatermark, 5000);
            moveWatermark();
            window.addEventListener('resize', moveWatermark);
            document.addEventListener('fullscreenchange', function() { setTimeout(moveWatermark, 300); });
        }

        window.addEventListener('load', initWatermark);
    </script>
